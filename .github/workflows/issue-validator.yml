name: Issue Validator

on:
  issues:
    types: [opened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout validator
        uses: actions/checkout@v4

      - name: Validate issue metadata
        uses: actions/github-script@v7
        with:
          script: |
            const { validateIssue } = require('./scripts/issue-validator.cjs');
            await validateIssue({ github, context });
